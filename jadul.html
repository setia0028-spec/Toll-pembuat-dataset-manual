<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 RP Dataset Creator</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #252540;
            --bg-card: #1e1e35;
            --accent: #6c5ce7;
            --accent-hover: #7d6ff0;
            --accent-soft: rgba(108, 92, 231, 0.15);
            --user-color: #00b894;
            --user-soft: rgba(0, 184, 148, 0.12);
            --bot-color: #a29bfe;
            --bot-soft: rgba(162, 155, 254, 0.12);
            --danger: #e74c3c;
            --danger-soft: rgba(231, 76, 60, 0.15);
            --warning: #f39c12;
            --warning-soft: rgba(243, 156, 18, 0.15);
            --success: #2ecc71;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0b8;
            --text-muted: #666680;
            --border: #2a2a45;
            --border-light: #353555;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --transition: 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === HEADER === */
        .header {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        .mode-switch {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 3px;
            gap: 2px;
        }
        .mode-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 7px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }
        .mode-btn.active {
            background: var(--accent);
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(108, 92, 231, 0.4);
        }
        .mode-btn:hover:not(.active) {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.82rem;
        }
        .stat-pill {
            background: var(--bg-tertiary);
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-pill .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }
        .stat-pill.draft .dot { background: var(--warning); }
        .stat-pill.locked { border: 1px solid var(--danger); }
        .stat-pill.locked .dot { background: var(--danger); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* === MAIN LAYOUT === */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* === CHAT PANEL === */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .system-prompt-bar {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .system-prompt-bar details {
            cursor: pointer;
        }
        .system-prompt-bar summary {
            font-size: 0.8rem;
            color: var(--text-secondary);
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .system-prompt-bar summary::before { content: '▶'; font-size: 0.6rem; transition: var(--transition); }
        .system-prompt-bar details[open] summary::before { transform: rotate(90deg); }
        .system-prompt-bar textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            resize: vertical;
            min-height: 50px;
            font-size: 0.85rem;
            margin-top: 8px;
            font-family: inherit;
            line-height: 1.5;
        }
        .system-prompt-bar textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
            scroll-behavior: smooth;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 12px;
        }
        .empty-state .icon { font-size: 3rem; opacity: 0.3; }
        .empty-state p { font-size: 0.9rem; }

        /* Chat Messages */
        .msg {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
            animation: msgIn 0.25s ease;
            font-size: 0.9rem;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user {
            align-self: flex-end;
            background: var(--user-soft);
            border: 1px solid rgba(0, 184, 148, 0.25);
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            align-self: flex-start;
            background: var(--bot-soft);
            border: 1px solid rgba(162, 155, 254, 0.25);
            border-bottom-left-radius: 4px;
        }
        .msg-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .msg.user .msg-label { color: var(--user-color); }
        .msg.assistant .msg-label { color: var(--bot-color); }
        .msg-content { white-space: pre-wrap; }
        .msg-actions {
            position: absolute;
            top: -10px;
            right: -10px;
            display: none;
            gap: 4px;
        }
        .msg:hover .msg-actions { display: flex; }
        .msg-actions button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 26px; height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .msg-actions button:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        /* === INPUT PANEL (RIGHT SIDEBAR) === */
        .input-panel {
            width: 380px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .input-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .input-section:last-child { border-bottom: none; }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .role-tabs {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 3px;
            margin-bottom: 12px;
        }
        .role-tab {
            flex: 1;
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: var(--transition);
        }
        .role-tab.active-user {
            background: var(--user-color);
            color: white;
            font-weight: 600;
        }
        .role-tab.active-assistant {
            background: var(--bot-color);
            color: white;
            font-weight: 600;
        }
        .role-tab:hover:not([class*="active"]) {
            background: var(--bg-card);
        }

        .input-textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: var(--radius-sm);
            resize: none;
            font-size: 0.88rem;
            font-family: inherit;
            line-height: 1.5;
            min-height: 100px;
            transition: var(--transition);
        }
        .input-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .input-textarea.user-focus:focus {
            border-color: var(--user-color);
            box-shadow: 0 0 0 3px var(--user-soft);
        }
        .input-textarea.assistant-focus:focus {
            border-color: var(--bot-color);
            box-shadow: 0 0 0 3px var(--bot-soft);
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .template-select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            cursor: pointer;
            max-width: 200px;
        }
        .template-select:focus { outline: none; border-color: var(--accent); }

        .btn {
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 9px 20px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-user { background: var(--user-color); color: white; }
        .btn-user:hover { filter: brightness(1.1); }
        .btn-assistant { background: var(--bot-color); color: white; }
        .btn-assistant:hover { filter: brightness(1.1); }
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: #000; }

        /* ORPO Section */
        .orpo-section {
            display: none;
            background: linear-gradient(135deg, rgba(231,76,60,0.05), rgba(231,76,60,0.02));
        }
        .orpo-section.active { display: block; }
        .orpo-section .section-title { color: var(--danger); }
        .orpo-field { margin-bottom: 14px; }
        .orpo-field:last-child { margin-bottom: 0; }
        .orpo-field label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .orpo-field textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            resize: vertical;
            font-size: 0.85rem;
            font-family: inherit;
            line-height: 1.5;
        }
        .orpo-field textarea:focus {
            outline: none;
            border-color: var(--danger);
            box-shadow: 0 0 0 3px var(--danger-soft);
        }

        /* === TOOLBAR === */
        .toolbar {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        /* === TOAST === */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 0.85rem;
            box-shadow: var(--shadow);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 400px;
        }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.warning { border-left: 3px solid var(--warning); }
        .toast.info { border-left: 3px solid var(--accent); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* === ERROR MODAL === */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .error-box {
            background: var(--bg-secondary);
            border: 1px solid var(--danger);
            padding: 28px;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .error-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .error-icon {
            width: 44px; height: 44px;
            background: var(--danger-soft);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        .error-header h3 {
            font-size: 1.05rem;
            color: var(--danger);
        }
        .error-body {
            color: var(--text-secondary);
            font-size: 0.88rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .error-steps {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 20px;
        }
        .error-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 6px 0;
            font-size: 0.84rem;
            color: var(--text-secondary);
        }
        .error-step .step-num {
            background: var(--danger);
            color: white;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .error-actions {
            display: flex;
            justify-content: flex-end;
        }

        /* === EDIT MODAL === */
        .edit-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 550px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: modalIn 0.25s ease;
        }
        .edit-box h3 { margin-bottom: 14px; font-size: 1rem; }
        .edit-box textarea {
            width: 100%;
            min-height: 140px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-family: inherit;
            line-height: 1.5;
            resize: vertical;
        }
        .edit-box textarea:focus { outline: none; border-color: var(--accent); }
        .edit-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 14px;
        }

        /* === PREVIEW MODAL === */
        .preview-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: var(--radius-lg);
            width: 95%;
            max-width: 750px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: modalIn 0.25s ease;
        }
        .preview-box h3 { margin-bottom: 14px; font-size: 1rem; }
        .preview-box pre {
            background: var(--bg-primary);
            padding: 16px;
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 55vh;
            overflow-y: auto;
            color: #7fdbca;
            border: 1px solid var(--border);
        }
        .preview-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 14px;
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .input-panel { width: 100%; max-height: 45vh; }
            .header { flex-wrap: wrap; gap: 10px; }
            .msg { max-width: 90%; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <div class="logo">🎭 RP <span>Dataset</span></div>
        <div class="mode-switch">
            <button class="mode-btn active" id="mode-sft" onclick="switchMode('sft')">📝 SFT Reasoning</button>
            <button class="mode-btn" id="mode-orpo" onclick="switchMode('orpo')">⚖️ ORPO</button>
        </div>
    </div>
    <div class="header-stats">
        <div class="stat-pill" id="stat-saved">
            <span class="dot"></span>
            <span id="stat-saved-text">0 tersimpan</span>
        </div>
        <div class="stat-pill draft" id="stat-draft" style="display:none;">
            <span class="dot"></span>
            <span id="stat-draft-text">0 draft</span>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <!-- CHAT PANEL -->
    <div class="chat-panel">
        <div class="system-prompt-bar">
            <details>
                <summary>System Prompt (klik untuk展开/收起)</summary>
                <textarea id="system-prompt">Kamu adalah [NAMA], sahabat empatik. Validasi emosi user sebelum memberi saran. Gunakan bahasa kasual. Tetap dalam karakter.</textarea>
            </details>
        </div>
        <div id="chat-container">
            <div class="empty-state" id="empty-state">
                <div class="icon">💬</div>
                <p>Mulai buat percakapan dari panel kanan</p>
            </div>
        </div>
    </div>

    <!-- INPUT PANEL (SIDEBAR) -->
    <div class="input-panel">
        <!-- Role Tabs + Input -->
        <div class="input-section">
            <div class="section-title">✏️ Tulis Pesan</div>
            <div class="role-tabs">
                <button class="role-tab active-user" id="tab-user" onclick="setRole('user')">👤 User</button>
                <button class="role-tab" id="tab-assistant" onclick="setRole('assistant')">🤖 Assistant</button>
            </div>

            <textarea class="input-textarea user-focus" id="msg-input" placeholder='Tulis pesan user... Contoh: "goblok lu!" / "aku capek banget"'></textarea>

            <div class="input-footer">
                <select class="template-select" id="template-select" onchange="applyTemplateFromSelect()">
                    <option value="">📋 Pilih template...</option>
                </select>
                <button class="btn btn-user" id="send-btn" onclick="addMessage()">
                    Kirim
                </button>
            </div>
        </div>

        <!-- ORPO Fields -->
        <div class="input-section orpo-section" id="orpo-section">
            <div class="section-title">⚖️ ORPO — Rejected & Reason</div>
            <div class="orpo-field">
                <label>❌ Rejected Response (respons buruk)</label>
                <textarea id="rejected-input" rows="3" placeholder='Contoh: "Mohon gunakan bahasa yang sopan dalam berkomunikasi."'></textarea>
            </div>
            <div class="orpo-field">
                <label>💡 Reason (mengapa chosen lebih baik)</label>
                <textarea id="reason-input" rows="2" placeholder='Contoh: "Chosen memvalidasi emosi. Rejected langsung menegakkan aturan."'></textarea>
            </div>
        </div>
    </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
    <div class="toolbar-group">
        <button class="btn btn-primary" onclick="saveConversation()">✅ Simpan</button>
        <button class="btn btn-ghost" onclick="previewData()">👁️ Preview</button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <button class="btn btn-success" onclick="downloadAndClear()">💾 Download & Bersihkan</button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <button class="btn btn-ghost" onclick="importJSONL()">📂 Import</button>
        <button class="btn btn-ghost" onclick="clearCurrentMode()" style="color: var(--danger);">🗑️ Hapus Mode Ini</button>
    </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<!-- ERROR MODAL -->
<div class="modal-overlay" id="error-modal">
    <div class="error-box">
        <div class="error-header">
            <div class="error-icon">🚫</div>
            <h3 id="error-title">Tidak Bisa Pindah Mode</h3>
        </div>
        <div class="error-body" id="error-message"></div>
        <div class="error-steps" id="error-steps"></div>
        <div class="error-actions">
            <button class="btn btn-danger" onclick="closeErrorModal()">Mengerti</button>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
    <div class="edit-box">
        <h3>✏️ Edit Pesan</h3>
        <textarea id="edit-textarea"></textarea>
        <div class="edit-actions">
            <button class="btn btn-ghost" onclick="closeEditModal()">Batal</button>
            <button class="btn btn-primary" onclick="saveEdit()">Simpan</button>
        </div>
    </div>
</div>

<!-- PREVIEW MODAL -->
<div class="modal-overlay" id="preview-modal">
    <div class="preview-box">
        <h3 id="preview-title">👁️ Preview Data</h3>
        <pre id="preview-content"></pre>
        <div class="preview-actions">
            <button class="btn btn-ghost" onclick="closePreview()">Tutup</button>
        </div>
    </div>
</div>

<input type="file" id="file-import" accept=".jsonl,.json" style="display:none" onchange="handleFileImport(event)">

<script>
// ============================================================
// STATE
// ============================================================
let currentMode = 'sft';
let currentRole = 'user';
let currentMessages = [];
let sftSaved = [];
let orpoSaved = [];
let editingIndex = null;

const chatContainer = document.getElementById('chat-container');
const msgInput = document.getElementById('msg-input');
const systemPromptEl = document.getElementById('system-prompt');

function getSavedArray() { return currentMode === 'sft' ? sftSaved : orpoSaved; }
function getModeLabel(mode) { return mode === 'sft' ? 'SFT Reasoning' : 'ORPO'; }

// ============================================================
// TOAST
// ============================================================
function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ============================================================
// TEMPLATES
// ============================================================
const TEMPLATES = {
    sft: [
        { label: '📋 Kasar/Frustrasi', content: '<internal> User menggunakan kata kasar ditujukan ke saya. Ini ekspresi frustrasi, bukan permintaan faktual. Emosi dominan: marah/ketidakpuasan. Respons yang dibutuhkan: validasi emosi + permintaan maaf, bukan penjelasan atau klarifikasi.</internal>\n\nMaaf ya, sepertinya ada yang bikin kamu kesal. Mau cerita apa yang terjadi?' },
        { label: '📋 Permintaan Berbahaya', content: '<internal> User meminta sesuatu yang berisiko. Menolak mentah-mentah akan membuat user merasa dihakimi. Strategi: akui permintaan, beri informasi risiko, biarkan user memutuskan.</internal>\n\nBaik, saya dengar permintaan Anda. Tapi saya perlu info dulu: hal yang diminta punya risiko tertentu. Anda yakin mau lanjut setelah tahu risikonya?' },
        { label: '📋 Curhat/Lelah', content: '<internal> User mengekspresikan kelelahan emosional. Ini bukan permintaan solusi, tapi kebutuhan didengar. Jangan langsung kasih saran. Validasi dulu, eksplorasi penyebab.</internal>\n\nKamu capeknya badan atau pikiran? Biar aku ngerti kondisi kamu dulu.' }
    ],
    orpo: [
        { label: '📋 Chosen (Empatik)', content: '<internal> Awal sesi, belum ada konteks. Ucapan kasar bisa berupa testing atau frustrasi. Jangan berasumsi penyebab. Buka ruang dialog tanpa menegakkan aturan.</internal>\n\nWaduh, kayaknya lagi ada sesuatu nih. Aku dengerin kalau mau cerita.' },
        { label: '📋 Chosen (Tanpa Internal)', content: 'Waduh, kayaknya lagi ada sesuatu nih. Aku dengerin kalau mau cerita.' }
    ]
};

function populateTemplates() {
    const select = document.getElementById('template-select');
    const templates = TEMPLATES[currentMode];
    select.innerHTML = '<option value="">📋 Pilih template...</option>';
    templates.forEach((t, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = t.label;
        select.appendChild(opt);
    });
}

function applyTemplateFromSelect() {
    const select = document.getElementById('template-select');
    const idx = select.value;
    if (idx === '') return;
    const templates = TEMPLATES[currentMode];
    msgInput.value = templates[idx].content;
    setRole('assistant');
    msgInput.focus();
    select.value = '';
}

// ============================================================
// ROLE TABS
// ============================================================
function setRole(role) {
    currentRole = role;
    const tabUser = document.getElementById('tab-user');
    const tabAsst = document.getElementById('tab-assistant');
    const sendBtn = document.getElementById('send-btn');

    tabUser.className = 'role-tab' + (role === 'user' ? ' active-user' : '');
    tabAsst.className = 'role-tab' + (role === 'assistant' ? ' active-assistant' : '');

    msgInput.className = 'input-textarea ' + (role === 'user' ? 'user-focus' : 'assistant-focus');
    sendBtn.className = 'btn ' + (role === 'user' ? 'btn-user' : 'btn-assistant');
    sendBtn.textContent = role === 'user' ? 'Kirim' : 'Tambah';

    if (role === 'user') {
        msgInput.placeholder = 'Tulis pesan user... Contoh: "goblok lu!" / "aku capek banget"';
    } else {
        if (currentMode === 'sft') {
            msgInput.placeholder = '<internal> Analisis emosi, konteks, strategi... </internal>\n\n[Baris kosong]\n\n[Respons aktual yang empatik]';
        } else {
            msgInput.placeholder = 'Tulis respons assistant yang BAIK (chosen).\nEmpatik, validasi emosi, buka ruang dialog.';
        }
    }
}

// ============================================================
// MODE SWITCH — BLOKIR KERAS
// ============================================================
function switchMode(newMode) {
    if (newMode === currentMode) return;

    const savedCount = getSavedArray().length;
    const draftCount = currentMessages.length;
    const currentLabel = getModeLabel(currentMode);
    const newLabel = getModeLabel(newMode);

    if (draftCount > 0) {
        showErrorModal(
            `Anda punya ${draftCount} pesan draft ${currentLabel} yang belum disimpan.`,
            [
                `Klik "✅ Simpan" untuk menyimpan ke ${currentLabel}`,
                `Klik "💾 Download & Bersihkan" untuk download JSONL`,
                `Baru bisa pindah ke ${newLabel}`
            ]
        );
        return;
    }

    if (savedCount > 0) {
        showErrorModal(
            `Mode ${currentLabel} masih punya ${savedCount} data yang belum didownload.`,
            [
                `Klik "💾 Download & Bersihkan" untuk download dan mengosongkan`,
                `Baru bisa pindah ke ${newLabel}`,
                `Atau klik "🗑️ Hapus Mode Ini" jika data tidak diperlukan`
            ]
        );
        return;
    }

    currentMode = newMode;
    applyModeUI();
    showToast(`Mode berpindah ke ${newLabel}`, 'info');
}

function applyModeUI() {
    document.getElementById('mode-sft').classList.toggle('active', currentMode === 'sft');
    document.getElementById('mode-orpo').classList.toggle('active', currentMode === 'orpo');
    document.getElementById('orpo-section').classList.toggle('active', currentMode === 'orpo');

    populateTemplates();
    setRole(currentRole);
    renderChat();
    updateStats();
}

function showErrorModal(message, steps) {
    document.getElementById('error-message').innerHTML = message;
    document.getElementById('error-steps').innerHTML = steps.map((s, i) =>
        `<div class="error-step"><span class="step-num">${i+1}</span><span>${s}</span></div>`
    ).join('');
    document.getElementById('error-modal').classList.add('active');
}

function closeErrorModal() {
    document.getElementById('error-modal').classList.remove('active');
}

// ============================================================
// RENDER CHAT
// ============================================================
function renderChat() {
    const empty = document.getElementById('empty-state');

    if (currentMessages.length === 0) {
        chatContainer.innerHTML = '';
        chatContainer.appendChild(empty);
        empty.style.display = 'flex';
        updateStats();
        return;
    }

    if (empty) empty.style.display = 'none';
    chatContainer.innerHTML = '';

    currentMessages.forEach((msg, idx) => {
        const div = document.createElement('div');
        div.className = `msg ${msg.role}`;
        div.innerHTML = `
            <div class="msg-label">${msg.role === 'user' ? '👤 User' : '🤖 Assistant'}</div>
            <div class="msg-content">${escapeHtml(msg.content)}</div>
            <div class="msg-actions">
                <button onclick="openEditModal(${idx})" title="Edit">✏️</button>
                <button onclick="deleteMessage(${idx})" title="Hapus">🗑️</button>
            </div>
        `;
        chatContainer.appendChild(div);
    });

    chatContainer.scrollTop = chatContainer.scrollHeight;
    updateStats();
}

function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ============================================================
// ADD MESSAGE
// ============================================================
function addMessage() {
    const content = msgInput.value.trim();
    if (!content) {
        showToast('Tulis pesan dulu!', 'warning');
        return;
    }

    if (currentRole === 'assistant' && currentMode === 'sft' && !content.includes('<internal>')) {
        if (!confirm('⚠️ Mode SFT butuh <internal>reasoning</internal>. Lanjutkan tanpa reasoning?')) return;
    }

    const empty = document.getElementById('empty-state');
    if (empty) empty.style.display = 'none';

    currentMessages.push({ role: currentRole, content });
    msgInput.value = '';
    msgInput.style.height = 'auto';

    // Auto-switch role setelah kirim
    if (currentRole === 'user') {
        setRole('assistant');
    } else {
        setRole('user');
    }

    renderChat();
    msgInput.focus();
}

// ============================================================
// EDIT / DELETE
// ============================================================
function openEditModal(idx) {
    editingIndex = idx;
    document.getElementById('edit-textarea').value = currentMessages[idx].content;
    document.getElementById('edit-modal').classList.add('active');
}
function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('active');
    editingIndex = null;
}
function saveEdit() {
    if (editingIndex !== null) {
        currentMessages[editingIndex].content = document.getElementById('edit-textarea').value.trim();
        renderChat();
        closeEditModal();
        showToast('Pesan diperbarui', 'success');
    }
}
function deleteMessage(idx) {
    currentMessages.splice(idx, 1);
    renderChat();
}

// ============================================================
// SAVE
// ============================================================
function saveConversation() {
    if (currentMessages.length < 2) {
        showToast('Minimal 2 pesan (user + assistant)!', 'warning');
        return;
    }
    const sysPrompt = systemPromptEl.value.trim();

    if (currentMode === 'sft') {
        const hasInternal = currentMessages.some(m => m.role === 'assistant' && m.content.includes('<internal>'));
        if (!hasInternal) {
            if (!confirm('⚠️ Tidak ada <internal> di respons assistant. Tetap simpan?')) return;
        }
        const messages = [{ role: 'system', content: sysPrompt }, ...currentMessages.map(m => ({...m}))];
        sftSaved.push({ messages });
    } else {
        const rejected = document.getElementById('rejected-input').value.trim();
        const reason = document.getElementById('reason-input').value.trim();
        if (!rejected) { showToast('Rejected wajib diisi!', 'error'); return; }
        if (!reason) { showToast('Reason wajib diisi!', 'error'); return; }
        const userMsgs = currentMessages.filter(m => m.role === 'user');
        const asstMsgs = currentMessages.filter(m => m.role === 'assistant');
        if (userMsgs.length === 0 || asstMsgs.length === 0) { showToast('Butuh minimal 1 user dan 1 assistant!', 'error'); return; }
        orpoSaved.push({
            prompt: userMsgs.map(m => m.content).join('\n'),
            chosen: asstMsgs.map(m => m.content).join('\n'),
            rejected: rejected,
            reason: reason
        });
        document.getElementById('rejected-input').value = '';
        document.getElementById('reason-input').value = '';
    }

    currentMessages = [];
    renderChat();
    updateStats();
    const count = getSavedArray().length;
    showToast(`Tersimpan sebagai ${getModeLabel(currentMode)} #${count}!`, 'success');
}

// ============================================================
// DOWNLOAD & CLEAR
// ============================================================
function downloadAndClear() {
    const data = getSavedArray();
    if (data.length === 0) {
        showToast(`Tidak ada data ${getModeLabel(currentMode)}!`, 'warning');
        return;
    }

    const lines = data.map(d => JSON.stringify(d));
    const blob = new Blob([lines.join('\n')], { type: 'application/jsonl' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const date = new Date().toISOString().slice(0,10);
    const label = currentMode === 'sft' ? 'sft_reasoning' : 'orpo';
    a.download = `${label}_${date}.jsonl`;
    a.click();
    URL.revokeObjectURL(url);

    const count = data.length;
    if (currentMode === 'sft') { sftSaved = []; } else { orpoSaved = []; }

    updateStats();
    showToast(`${count} percakapan ${getModeLabel(currentMode)} didownload & dibersihkan!`, 'success');
}

// ============================================================
// CLEAR
// ============================================================
function clearCurrentMode() {
    const count = getSavedArray().length;
    const label = getModeLabel(currentMode);
    let msg = `Hapus ${count} data ${label}`;
    if (currentMessages.length > 0) msg += ` + ${currentMessages.length} draft`;
    msg += `?`;
    if (!confirm(msg)) return;

    if (currentMode === 'sft') { sftSaved = []; } else { orpoSaved = []; }
    currentMessages = [];
    document.getElementById('rejected-input').value = '';
    document.getElementById('reason-input').value = '';
    renderChat();
    updateStats();
    showToast(`Data ${label} dihapus. Bebas pindah mode.`, 'info');
}

// ============================================================
// PREVIEW
// ============================================================
function previewData() {
    const data = getSavedArray();
    const label = getModeLabel(currentMode);
    let text = '';
    if (data.length === 0) {
        text = `Belum ada data ${label} tersimpan.`;
    } else {
        text += `=== ${label} (${data.length} samples) ===\n\n`;
        data.forEach((d, i) => { text += `--- Sample ${i+1} ---\n${JSON.stringify(d, null, 2)}\n\n`; });
    }
    if (currentMessages.length > 0) {
        text += `\n=== DRAFT (${currentMessages.length} pesan) ===\n`;
        currentMessages.forEach(m => { text += `[${m.role}] ${m.content.substring(0,120)}...\n`; });
    }
    document.getElementById('preview-title').textContent = `👁️ Preview: ${label}`;
    document.getElementById('preview-content').textContent = text;
    document.getElementById('preview-modal').classList.add('active');
}
function closePreview() { document.getElementById('preview-modal').classList.remove('active'); }

// ============================================================
// IMPORT
// ============================================================
function importJSONL() { document.getElementById('file-import').click(); }
function handleFileImport(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const lines = e.target.result.trim().split('\n');
            let s = 0, o = 0;
            lines.forEach(line => {
                if (!line.trim()) return;
                const obj = JSON.parse(line);
                if (obj.messages) { sftSaved.push(obj); s++; }
                else if (obj.prompt && obj.chosen) { orpoSaved.push(obj); o++; }
            });
            updateStats();
            showToast(`Import: ${s} SFT + ${o} ORPO`, 'success');
        } catch(err) { showToast('Gagal import: ' + err.message, 'error'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
    const count = getSavedArray().length;
    const draftCount = currentMessages.length;

    document.getElementById('stat-saved-text').textContent = `${count} tersimpan`;
    const statSaved = document.getElementById('stat-saved');
    statSaved.classList.toggle('locked', count > 0 || draftCount > 0);

    const statDraft = document.getElementById('stat-draft');
    if (draftCount > 0) {
        statDraft.style.display = 'flex';
        document.getElementById('stat-draft-text').textContent = `${draftCount} draft`;
    } else {
        statDraft.style.display = 'none';
    }
}

// ============================================================
// KEYBOARD SHORTCUT
// ============================================================
msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        addMessage();
    }
});

msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

// ============================================================
// INIT
// ============================================================
applyModeUI();
renderChat();
</script>
</body>
</html>
